<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Key Tester</title>
<style>
body {
  background:#0a0b0e;
  color:#c9d1e0;
  font-family: monospace;
  padding:20px;
}
textarea {
  width:100%;
  height:150px;
  background:#111;
  color:#0f0;
  border:1px solid #333;
  padding:10px;
  margin-bottom:10px;
}
button {
  padding:10px 20px;
  background:#00e5a0;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
.result { margin-top:15px; }
.item {
  border:1px solid #222;
  margin-bottom:8px;
  border-radius:6px;
  overflow:hidden;
}
.header {
  padding:10px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}
.valid { color:#00e5a0; }
.invalid { color:#ff4d6a; }
.content {
  display:none;
  padding:10px;
  background:#111;
  border-top:1px solid #222;
  font-size:12px;
  white-space:pre-wrap;
}
.arrow {
  transition: transform 0.2s;
}
.open .arrow {
  transform: rotate(90deg);
}
</style>
</head>
<body>
<h2>🗝️ Gemini API Key Tester</h2>
<textarea id="keyInput" placeholder="Enter API keys (one per line)"></textarea>
<button onclick="runTest()">RUN TEST</button>
<div class="result" id="results"></div>
<script>
const KEY_REGEX = /AIza[0-9A-Za-z_-]{35}/;  // ← hyphen moved to end, fixed

function parseKeys() {
  return document.getElementById('keyInput').value
    .split('\n')
    .map(k => k.trim().replace(/^=+/, ''))
    .filter(k => KEY_REGEX.test(k));
}
async function testKey(key) {
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${encodeURIComponent(key)}`);
    const text = await res.text();
    return {
      key,
      status: res.ok ? 'valid' : 'invalid',
      http: res.status,
      body: text
    };
  } catch (e) {
    return {
      key,
      status: 'invalid',
      http: 'ERR',
      body: e.message
    };
  }
}
function toggle(el) {
  el.classList.toggle('open');
  const content = el.querySelector('.content');
  content.style.display = content.style.display === 'block' ? 'none' : 'block';
}
async function runTest() {
  const output = document.getElementById('results');
  output.innerHTML = 'Testing...';
  const keys = parseKeys();
  let html = '';
  for (const key of keys) {
    const r = await testKey(key);
    html += `
    <div class="item ${r.status}">
      <div class="header" onclick="toggle(this.parentElement)">
        <span>
          ▶ ${r.status.toUpperCase()} → ${r.key}
          [HTTP ${r.http}]
        </span>
        <span class="arrow">▶</span>
      </div>
      <div class="content">${escapeHtml(r.body)}</div>
    </div>`;
  }
  output.innerHTML = html || 'No valid keys entered.';
}
function escapeHtml(str) {
  return str.replace(/[&<>"]/g, t => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;'
  }[t]));
}
</script>
</body>
</html>
