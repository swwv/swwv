<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Key Tester</title>
<style>
  body {
    background: #0a0b0e;
    color: #c9d1e0;
    font-family: monospace;
    padding: 20px;
  }

  textarea {
    width: 100%;
    height: 150px;
    background: #111;
    color: #0f0;
    border: 1px solid #333;
    padding: 10px;
    margin-bottom: 10px;
  }

  button {
    padding: 10px 20px;
    background: #00e5a0;
    border: none;
    cursor: pointer;
    font-weight: bold;
  }

  .result {
    margin-top: 15px;
    font-size: 13px;
  }

  .valid { color: #00e5a0; }
  .invalid { color: #ff4d6a; }
</style>
</head>
<body>

<h2>🗝️ Gemini API Key Tester</h2>

<textarea id="keyInput" placeholder="Enter API keys (one per line)"></textarea>

<button onclick="runTest()">RUN TEST</button>

<div class="result" id="results"></div>

<script>
const KEY_REGEX = /AIza[0-9A-Za-z\\-_]{35}/;

function parseKeys() {
  return document.getElementById('keyInput').value
    .split('\n')
    .map(k => k.trim())
    .filter(k => KEY_REGEX.test(k));
}

async function testKey(key) {
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key==${key}`);
    if (res.ok) {
      return { key, status: 'valid' };
    } else {
      return { key, status: 'invalid' };
    }
  } catch {
    return { key, status: 'invalid' };
  }
}

async function runTest() {
  const output = document.getElementById('results');
  output.innerHTML = 'Testing...';

  const keys = parseKeys();
  let html = '';

  for (const key of keys) {
    const result = await testKey(key);
    html += `<div class="${result.status}">
      ${result.status.toUpperCase()} → ${key}
    </div>`;
  }

  output.innerHTML = html || 'No valid keys entered.';
}
</script>

</body>
</html>
